<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SafeHos — Одобрено</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #060d08;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-glow {
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(63,185,80,0.1) 0%, transparent 60%);
      pointer-events: none;
      animation: pulse-glow 2s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%,100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    /* Конфетти */
    .confetti-piece {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confetti-fall linear forwards;
      pointer-events: none;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .container {
      text-align: center;
      padding: 48px 32px;
      max-width: 520px;
      width: 90%;
      position: relative;
      z-index: 1;
    }

    .icon-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
    }
    .icon-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(63,185,80,0.3);
      animation: ring-expand 1.5s ease-out infinite;
    }
    .icon-ring:nth-child(2) { animation-delay: 0.4s; }
    .icon-ring:nth-child(3) { animation-delay: 0.8s; }
    @keyframes ring-expand {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    .icon-inner {
      position: absolute;
      inset: 10px;
      background: radial-gradient(135deg, rgba(63,185,80,0.15), rgba(63,185,80,0.05));
      border: 2px solid rgba(63,185,80,0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes pop-in {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #3fb950, #56d364);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      animation: fadeInUp 0.4s ease 0.2s both;
    }

    .subtitle {
      color: #7d8590;
      font-size: 14px;
      margin-bottom: 24px;
      animation: fadeInUp 0.4s ease 0.3s both;
    }

    .domain-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(63,185,80,0.08);
      border: 1px solid rgba(63,185,80,0.25);
      padding: 10px 20px;
      border-radius: 10px;
      font-family: monospace;
      font-size: 16px;
      color: #7ee787;
      margin-bottom: 28px;
      animation: fadeInUp 0.4s ease 0.4s both;
    }

    .info-card {
      background: rgba(63,185,80,0.05);
      border: 1px solid rgba(63,185,80,0.15);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 28px;
      animation: fadeInUp 0.4s ease 0.5s both;
    }
    .info-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(63,185,80,0.1);
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .label { font-size: 12px; color: #484f58; flex: 1; }
    .info-row .value { font-size: 12px; color: #3fb950; font-weight: 600; }

    .countdown {
      font-size: 13px;
      color: #484f58;
      margin-bottom: 20px;
      animation: fadeInUp 0.4s ease 0.6s both;
    }
    .countdown span {
      color: #3fb950;
      font-weight: 700;
      font-family: monospace;
      font-size: 16px;
    }

    .btn-enter {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #3fb950, #2ea043);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(63,185,80,0.3);
      animation: fadeInUp 0.4s ease 0.7s both;
    }
    .btn-enter:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(63,185,80,0.4);
    }
    .btn-enter:active { transform: translateY(0); }

    .safehos-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 28px;
      font-size: 11px;
      color: #30363d;
      animation: fadeInUp 0.4s ease 0.8s both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="container">
    <div class="icon-container">
      <div class="icon-ring"></div>
      <div class="icon-ring"></div>
      <div class="icon-ring"></div>
      <div class="icon-inner">✅</div>
    </div>

    <h1>Доступ разрешён!</h1>
    <p class="subtitle" id="subtitle">Модератор проверил и одобрил этот сайт</p>

    <div class="domain-badge"><span>🌐</span><span id="domain">загрузка...</span></div>

    <div class="info-card">
      <div class="info-row">
        <span style="font-size:16px">👤</span>
        <span class="label">Проверено</span>
        <span class="value">Модератором SafeHos</span>
      </div>
      <div class="info-row">
        <span style="font-size:16px">⏱</span>
        <span class="label">Время проверки</span>
        <span class="value" id="check-time">—</span>
      </div>
      <div class="info-row">
        <span style="font-size:16px">🔒</span>
        <span class="label">Статус</span>
        <span class="value">✓ Безопасно открывать</span>
      </div>
    </div>

    <p class="countdown">Автоматический переход через <span id="countdown">3</span> сек</p>

    <button class="btn-enter" id="enter-btn">
      <span>🚀</span> Войти на сайт
    </button>

    <div class="safehos-badge">
      <span>🛡️</span><span>Защищено SafeHos Security Platform</span>
    </div>
  </div>

  <script src="js/approved.js"></script>
</body>
</html>
